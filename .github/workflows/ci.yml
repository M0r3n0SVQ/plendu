name: CI

on:
  pull_request:
    branches: [master]
  push:
    branches: [master]

# Cancel in-progress runs for the same branch — saves minutes on
# rapid-fire pushes.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-build:
    name: Lint + Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    env:
      # Disable Next.js telemetry on CI.
      NEXT_TELEMETRY_DISABLED: '1'
      # Sentry sourcemap upload is opt-in; the build succeeds without it.
      # We deliberately don't expose SENTRY_AUTH_TOKEN here — the wrapper
      # in next.config.mjs swallows upload failures.

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build
